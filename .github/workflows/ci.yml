name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7
        ports: ['6379:6379']

    env:
      NODE_ENV: development
      PORT: 5002
      MONGO_URI: mongodb://localhost:27017/arti-ci
      REDIS_URL: redis://localhost:6379
      # CI'a özel değerler — üretim secret'larıyla ilgisi yok
      JWT_SECRET: ci-jwt-secret-yalnizca-testte-kullanilir-0123456789abcdef
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      WEBHOOK_SECRET: ci-webhook-secret
      DESK360_WEBHOOK_TOKEN: ci-desk360-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: API'yi başlat ve hazır olmasını bekle
        run: |
          node server.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5002/healthz && break
            sleep 1
          done
          curl -sf http://localhost:5002/healthz

      - name: Faz 1 duman testi (27 kontrol)
        run: node scripts/e2e-smoke.js

      - name: Faz 2 duman testi (18 kontrol)
        run: node scripts/e2e-faz2.js

      - name: Faz 3 duman testi (görsel yükleme akışı)
        run: node scripts/e2e-faz3.js

      - name: Faz 4 duman testi (favori/bildirim/fraud/rapor)
        run: node scripts/e2e-faz4.js
