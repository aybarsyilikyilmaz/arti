# Artı API — Nginx reverse proxy şablonu (PLAN.md Faz 3)
# Kurulum: /etc/nginx/sites-available/arti → symlink sites-enabled → nginx -t → reload
# TLS sertifikası certbot ile alınır:
#   sudo certbot --nginx -d api.artiapp.com.tr
# certbot bu dosyaya 443 bloğunu ve yönlendirmeyi kendisi ekler/düzenler.

# Aynı IP'den agresif istekleri Nginx katmanında da frenle (uygulama limitine ek)
limit_req_zone $binary_remote_addr zone=arti_api:10m rate=20r/s;

server {
    listen 80;
    server_name api.artiapp.com.tr;

    # certbot sonrası: return 301 https://$host$request_uri;

    # Gövde limiti: API JSON limiti 2mb; görseller üretimde doğrudan S3'e gider
    client_max_body_size 5m;

    # Slowloris'e ağ katmanında ilk fren
    client_body_timeout 20s;
    client_header_timeout 20s;

    gzip on;
    gzip_types application/json;

    location / {
        limit_req zone=arti_api burst=40 nodelay;

        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        # Uygulamadaki `trust proxy` bu başlıklara güvenir (rate limit doğruluğu)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 130s; # multipart timeout'u (120s) app'te kopmalı, Nginx'te değil
    }

    # Sağlık ucu loglanmaz (UptimeRobot dakikada bir vurur)
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
    }
}

# certbot çalıştıktan sonra 443 bloğuna elle eklenecek sertleştirmeler:
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#   ssl_protocols TLSv1.2 TLSv1.3;
